general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple instances
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # turn on display after sleep
    ignore_dbus_inhibit = false                 # allow games/video players to block idle
}

# Dim monitor backlight
listener {
    timeout = 150                               # 2.5 minutes
    on-timeout = brightnessctl -s set 10        # set monitor brightness to minimum (avoid 0)
    on-resume = brightnessctl -r                # restore monitor brightness
}

# Turn off keyboard backlight (if applicable)
listener {
    timeout = 150                               # 2.5 minutes
    on-timeout = brightnessctl -sd rgb:kbd_backlight set 0
    on-resume = brightnessctl -rd rgb:kbd_backlight
}

# Lock screen
listener {
    timeout = 330                               # 5 minutes
    on-timeout = loginctl lock-session          # lock screen
}

# Turn off monitors
listener {
    timeout = 300                               # 5.5 minutes
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'    # turn off screen
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'        # turn on screen
}

# Suspend PC
listener {
    timeout = 1800                              # 30 minutes
    on-timeout = systemctl suspend              # suspend system
}
