font:
  normal:
    # family: JetBrainsMono Nerd Font Mono
    family: Iosevka Nerd Font Mono
    style: Regular
  bold:
    style: Bold
  italic:
    style: Italic
  bold_italic:
    style: Bold Italic
  size: 9

env:
  TERM: alacritty

window:
  class:
    instance: Alacritty
    general: Alacritty
  padding:
    x: 10
    y: 5

# Colors
colors:
  cursor:
    text: '#fefff2'
    cursor: '#f0cc09'

  selection:
    text: '#b5b5b5'
    background: '#18354f'

  primary:
    background: '#132738'
    foreground: '#ffffff'

  normal:
    black: '#000000'
    red: '#ff0000'
    green: '#38de21'
    yellow: '#ffe50a'
    blue: '#1460d2'
    magenta: '#ff005d'
    cyan: '#00bbbb'
    white: '#bbbbbb'

  bright:
    black: '#555555'
    red: '#f40e17'
    green: '#3bd01d'
    yellow: '#edc809'
    blue: '#5555ff'
    magenta: '#ff55ff'
    cyan: '#6ae3fa'
    white: '#ffffff'

cursor:
  style: Underline
